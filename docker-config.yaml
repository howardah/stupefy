services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo-db:27017/stupefy
    depends_on:
      mongo-db:
        condition: service_started
    restart: unless-stopped

  mongo-db:
    image: mongo:7
    container_name: stupefy-mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-db-data:/data/db
    restart: unless-stopped

volumes:
  mongo-db-data:
